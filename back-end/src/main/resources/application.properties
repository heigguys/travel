spring.application.name=back-end
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/db_company_travel?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath*:mapper/*.xml
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

logging.level.com.two.backend.mapper=DEBUG
logging.level.org.apache.ibatis=DEBUG

app.storage.root=storage
app.frontend.allowed-origins=http://localhost:8081,http://localhost:8082,http://127.0.0.1:8081,http://127.0.0.1:8082
